<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work-Task Demo</title>
  <style>
    :root { --bg:#0f172a; --panel:#111827; --card:#1e293b; --text:#e5e7eb; --muted:#94a3b8; --line:#334155; --accent:#38bdf8; --danger:#fb7185; --ok:#34d399; --warn:#fbbf24; }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827);color:var(--text)}
    header{padding:28px 32px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:16px;position:sticky;top:0;background:rgba(15,23,42,.9);backdrop-filter:blur(14px);z-index:5}
    h1{margin:0;font-size:30px} .sub{color:var(--muted);margin-top:6px}.badge{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:6px 10px;color:var(--muted);font-size:13px}
    main{padding:28px 32px;max-width:1400px;margin:auto}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.card{background:rgba(30,41,59,.72);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 18px 60px rgba(0,0,0,.22)}
    .stat b{font-size:32px}.stat span{display:block;color:var(--muted);margin-top:6px}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:24px 0}.tab{border:1px solid var(--line);background:#111827;color:var(--text);border-radius:14px;padding:10px 14px;cursor:pointer}.tab.active{background:var(--accent);color:#06121f;border-color:transparent}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}input,select,button{border:1px solid var(--line);background:#0b1220;color:var(--text);border-radius:12px;padding:11px 12px}button{cursor:pointer;background:#0284c7;border-color:#0284c7;font-weight:700}.ghost{background:#0b1220;border-color:var(--line)}
    table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:18px}th,td{text-align:left;padding:13px;border-bottom:1px solid var(--line)}th{color:var(--muted);font-size:13px}tr:hover td{background:rgba(56,189,248,.06)}
    .prio-Критический{color:var(--danger)}.prio-Высокий{color:var(--warn)}.prio-Средний{color:var(--accent)}.prio-Низкий{color:var(--ok)}.status{border-radius:999px;padding:5px 9px;background:#0b1220;border:1px solid var(--line);white-space:nowrap}.source{color:var(--accent)}
    .kanban{display:grid;grid-template-columns:repeat(4,minmax(220px,1fr));gap:14px}.col h3{margin:0 0 12px}.task{margin-bottom:10px}.muted{color:var(--muted)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.hidden{display:none}.detail{position:fixed;inset:0;background:rgba(2,6,23,.72);display:none;align-items:center;justify-content:center;padding:20px}.modal{max-width:760px;width:100%;max-height:86vh;overflow:auto}.detail.show{display:flex}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.kanban{grid-template-columns:1fr}header{align-items:flex-start;flex-direction:column}main{padding:18px}.toolbar input{width:100%}}
  </style>
</head>
<body>
<header>
  <div><h1>Work-Task</h1><div class="sub">Demo mode · задачи лаборатории моделирования · без backend</div></div>
  <span class="badge">GitHub Pages demo</span>
</header>
<main>
  <section class="grid" id="stats"></section>
  <div class="tabs"><button class="tab active" onclick="show('dashboard',this)">Dashboard</button><button class="tab" onclick="show('tasks',this)">Задачи</button><button class="tab" onclick="show('kanban',this)">Kanban</button><button class="tab" onclick="show('people',this)">Сотрудники</button><button class="tab" onclick="show('projects',this)">Проекты</button></div>
  <section id="dashboard" class="page"><div class="card"><h2>Ближайшие дедлайны</h2><div id="deadlines"></div></div></section>
  <section id="tasks" class="page hidden"><div class="toolbar"><input id="newTitle" placeholder="Новая задача" /><button onclick="addTask()">Создать быстро</button><input id="search" placeholder="Поиск" oninput="renderTasks()" /></div><div class="card"><table><thead><tr><th>ID</th><th>Задача</th><th>Статус</th><th>Приоритет</th><th>Срок</th><th>Источник</th></tr></thead><tbody id="taskRows"></tbody></table></div></section>
  <section id="kanban" class="page hidden"><div class="kanban" id="kanbanCols"></div></section>
  <section id="people" class="page hidden"><div class="card"><table><thead><tr><th>Сотрудник</th><th>Должность</th><th>Telegram</th><th>Задач</th></tr></thead><tbody id="peopleRows"></tbody></table></div></section>
  <section id="projects" class="page hidden"><div class="card"><table><thead><tr><th>Направление</th><th>Всего задач</th><th>Просрочено</th><th>Средний прогресс</th></tr></thead><tbody id="projectRows"></tbody></table></div></section>
</main>
<div class="detail" id="detail"><div class="card modal" id="modal"></div></div>
<script>
const KEY='work-task-demo-root-v1';
const day=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const users=[['Ахмеров Денис Альфредович','Заместитель начальника лаборатории','denis_lab'],['Иванов Сергей Петрович','Научный сотрудник','ivanov_model'],['Петрова Анна Игоревна','Инженер-исследователь','petrova_calc']].map((x,i)=>({id:i+1,full_name:x[0],title:x[1],telegram:x[2]}));
const projects=['Калибрование концов труб','Редукционно-растяжной стан','QForm-моделирование','Отчеты и презентации'].map((name,i)=>({id:i+1,name}));
function t(id,title,status,priority,user,project,offset,source,progress,clar=false){return{id,title,description:title,status,priority,responsible_id:user,project_id:project,due_date:day(offset),source,progress,requires_clarification:clar,comments:['Демо-комментарий'],history:['Создание задачи: '+source]}}
const seed=[t(1,'Подготовить модель калибрования конца трубы 244,48×8,94','В работе','Высокий',1,1,3,'Web',45),t(2,'Проверить влияние угла конусности на среднюю овальность','На проверке','Критический',2,1,1,'Telegram text',80),t(3,'Сформировать презентацию по результатам моделирования','Новая','Средний',3,4,7,'Web',10),t(4,'Провести расчет НДС при редуцировании','В работе','Высокий',2,2,5,'Telegram voice',55),t(5,'Подготовить отчет по эксперименту для ЧТПЗ','Ожидает данных','Средний',1,4,10,'Web',35,true),t(6,'Проверить исходные данные для QForm-модели','Просрочена','Высокий',2,3,-2,'Manual import',20,true),t(7,'Сформировать матрицу компьютерного эксперимента','Выполнена','Средний',3,1,-1,'Web',100),t(8,'Подготовить материалы по редукционно-растяжному стану','В работе','Средний',1,2,14,'Telegram text',40),t(9,'Проверить результаты по средней овальности','Требует уточнения','Критический',null,1,2,'Telegram voice',15,true),t(10,'Подготовить слайды по научной новизне','Отложена','Низкий',1,4,20,'Web',5)];
function load(){let r=localStorage.getItem(KEY);if(!r){localStorage.setItem(KEY,JSON.stringify(seed));return seed}return JSON.parse(r)}function save(x){localStorage.setItem(KEY,JSON.stringify(x))}let tasks=load();
function overdue(x){return x.status==='Просрочена'||(x.due_date<day(0)&&x.status!=='Выполнена')}
function render(){renderStats();renderTasks();renderKanban();renderPeople();renderProjects();renderDeadlines()}function renderStats(){let s=[['Всего',tasks.length],['В работе',tasks.filter(x=>x.status==='В работе').length],['Выполнено',tasks.filter(x=>x.status==='Выполнена').length],['Просрочено',tasks.filter(overdue).length],['Требуют уточнения',tasks.filter(x=>x.requires_clarification).length],['Из Telegram',tasks.filter(x=>x.source.includes('Telegram')).length],['Без ответственного',tasks.filter(x=>!x.responsible_id).length],['На проверке',tasks.filter(x=>x.status==='На проверке').length]];stats.innerHTML=s.map(x=>`<div class='card stat'><b>${x[1]}</b><span>${x[0]}</span></div>`).join('')}
function renderTasks(){let q=(search?.value||'').toLowerCase();let list=tasks.filter(x=>x.title.toLowerCase().includes(q));taskRows.innerHTML=list.map(x=>`<tr onclick='openTask(${x.id})'><td>#${x.id}</td><td>${x.title}${x.requires_clarification?' · ⚠️':''}</td><td><span class='status'>${x.status}</span></td><td class='prio-${x.priority}'>${x.priority}</td><td>${x.due_date}</td><td class='source'>${x.source}</td></tr>`).join('')}
function renderKanban(){let cols=['Новая','В работе','Ожидает данных','Требует уточнения','На проверке','Выполнена','Отложена','Просрочена'];kanbanCols.innerHTML=cols.map(c=>`<div class='card col'><h3>${c}</h3>${tasks.filter(x=>x.status===c).map(x=>`<div class='card task' onclick='openTask(${x.id})'><b>${x.title}</b><div class='muted'>${x.priority} · ${x.source}</div></div>`).join('')}</div>`).join('')}
function renderPeople(){peopleRows.innerHTML=users.map(u=>`<tr><td>${u.full_name}</td><td>${u.title}</td><td>@${u.telegram}</td><td>${tasks.filter(t=>t.responsible_id===u.id).length}</td></tr>`).join('')}
function renderProjects(){projectRows.innerHTML=projects.map(p=>{let a=tasks.filter(t=>t.project_id===p.id);let avg=a.length?Math.round(a.reduce((s,t)=>s+t.progress,0)/a.length):0;return`<tr><td>${p.name}</td><td>${a.length}</td><td>${a.filter(overdue).length}</td><td>${avg}%</td></tr>`}).join('')}
function renderDeadlines(){deadlines.innerHTML=[...tasks].sort((a,b)=>a.due_date.localeCompare(b.due_date)).slice(0,6).map(x=>`<div class='row' style='justify-content:space-between;border-bottom:1px solid var(--line);padding:12px 0'><b>${x.title}</b><span class='muted'>${x.due_date}</span></div>`).join('')}
function show(id,btn){document.querySelectorAll('.page').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));btn.classList.add('active')}
function addTask(){let v=newTitle.value.trim();if(!v)return;let id=Math.max(...tasks.map(x=>x.id))+1;tasks.unshift(t(id,v,'Новая','Средний',null,1,7,'Web',0,true));save(tasks);newTitle.value='';render()}
function openTask(id){let x=tasks.find(t=>t.id===id);modal.innerHTML=`<div class='row' style='justify-content:space-between'><h2>#${x.id} ${x.title}</h2><button class='ghost' onclick='detail.classList.remove("show")'>Закрыть</button></div><p class='muted'>${x.description}</p><div class='row'><select onchange='xstatus(${x.id},this.value)'>${['Новая','В работе','Ожидает данных','Требует уточнения','На проверке','Выполнена','Отложена','Просрочена'].map(s=>`<option ${s===x.status?'selected':''}>${s}</option>`).join('')}</select><select onchange='xprio(${x.id},this.value)'>${['Низкий','Средний','Высокий','Критический'].map(s=>`<option ${s===x.priority?'selected':''}>${s}</option>`).join('')}</select><span class='badge'>${x.source}</span><span class='badge'>Прогресс ${x.progress}%</span></div><h3>Комментарии</h3><ul>${x.comments.map(c=>`<li>${c}</li>`).join('')}</ul><div class='row'><input id='commentInput' placeholder='Комментарий'><button onclick='addComment(${x.id})'>Добавить</button></div><h3>История</h3><ul>${x.history.map(h=>`<li>${h}</li>`).join('')}</ul>`;detail.classList.add('show')}
function xstatus(id,v){let x=tasks.find(t=>t.id===id);x.status=v;x.history.push('Изменен статус: '+v);save(tasks);render();openTask(id)}function xprio(id,v){let x=tasks.find(t=>t.id===id);x.priority=v;x.history.push('Изменен приоритет: '+v);save(tasks);render();openTask(id)}function addComment(id){let x=tasks.find(t=>t.id===id);x.comments.push(commentInput.value||'Комментарий');x.history.push('Добавлен комментарий');save(tasks);render();openTask(id)}
render();
</script>
</body>
</html>
